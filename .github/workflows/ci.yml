name: Java Compile Check

on:
  push:
    branches:
      - main
    paths:
      - 'sdk-test-java/**/*.java'
      - 'sdk-test-java/**/pom.xml'
  pull_request:
    paths:
      - 'sdk-test-java/**/*.java'
      - 'sdk-test-java/**/pom.xml'

permissions:
  contents: read

jobs:
  compile:
    name: Compile Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -B
        working-directory: sdk-test-java